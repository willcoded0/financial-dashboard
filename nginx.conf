# nginx.conf - Reverse proxy for Financial Dashboard
#
# Deployment topology:
#   Internet → Cloudflare (SSL/CDN) → Proxmox VM (this nginx) → Docker container (port 5000)
#
# Cloudflare handles HTTPS termination. nginx listens on port 80 inside the Proxmox VM.
# In Cloudflare: set SSL/TLS mode to "Full" and proxy the domain.

# Rate limiting zones (defined at http block level in your nginx.conf or include this file)
limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=3r/m;
limit_req_zone $binary_remote_addr zone=general:10m   rate=30r/m;

server {
    listen 80;
    server_name _;   # Replace _ with your actual domain, e.g. dashboard.batmap.win

    # ── Cloudflare real IP passthrough ───────────────────────────────────
    # Trust Cloudflare IP ranges so $remote_addr shows the real visitor IP
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;

    # ── Security headers ──────────────────────────────────────────────────
    # (Flask also sets these; nginx adds them as a second layer)
    add_header X-Content-Type-Options  "nosniff"                        always;
    add_header X-Frame-Options         "DENY"                           always;
    add_header X-XSS-Protection        "1; mode=block"                  always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # ── Upload endpoint (strict rate limit) ───────────────────────────────
    location /upload {
        limit_req zone=upload_limit burst=2 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:5000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        client_max_body_size 50M;
        proxy_read_timeout   300s;   # give the pipeline time to process
        proxy_send_timeout   300s;
    }

    # ── SSE progress stream (disable buffering) ───────────────────────────
    location /progress/ {
        limit_req zone=general burst=10 nodelay;

        proxy_pass         http://127.0.0.1:5000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        '';
        proxy_http_version 1.1;

        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 120s;
    }

    # ── AI chat proxy (streaming — disable buffering) ─────────────────────
    location /api/ollama/ {
        limit_req zone=general burst=10 nodelay;

        proxy_pass         http://127.0.0.1:5000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 120s;
    }

    # ── All other routes ──────────────────────────────────────────────────
    location / {
        limit_req zone=general burst=20 nodelay;

        proxy_pass         http://127.0.0.1:5000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        client_max_body_size 50M;
        proxy_read_timeout   60s;
    }
}
